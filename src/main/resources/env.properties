# JNDIでDataSourceを取得する際のリソース名
nablarch.connectionFactory.jndiResourceName=

# JDBC接続ドライバクラス(DataSourceを直接使用する際の項目)
nablarch.db.jdbcDriver=oracle.jdbc.driver.OracleDriver

# JDBC接続URL(DataSourceを直接使用する際の項目)
nablarch.db.url=jdbc:oracle:thin:@[DOCKER_SERVICE_NAME]:1521/FREEPDB1

# DB接続ユーザ名(DataSourceを直接使用する際の項目)
nablarch.db.user=[USER]

# DB接続パスワード(DataSourceを直接使用する際の項目)
nablarch.db.password=[ORACLE_PW]

# DBスキーマ名(DataSourceを直接使用する際の項目)
nablarch.db.schema=[SCHEMA]

# 最大プールサイズ(DataSourceを直接使用する際の項目)
nablarch.db.maxPoolSize=10

# フォーマット定義ファイルの格納ディレクトリ
nablarch.filePathSetting.basePathSettings.format=file:./src/main/format

# 出力ファイルの出力先ディレクトリ
nablarch.filePathSetting.basePathSettings.output=file:./work/output

# バッチ入力ファイルの格納ディレクトリ
nablarch.filePathSetting.basePathSettings.input=file:./work/input


##
## メッセージング用設定
##

nablarch.useXA=true

# キューマネージャ名
nablarch.queueManagerName=TEST

# MQException発生時のエラー情報出力設定
nablarch.useProductSystemErrorOutput=true

nablarch.responseQueueName=TEST.RESPONSE

# 送信キュー名
nablarch.requestQueueName=TEST.REQUEST

# 退避キュー名
nablarch.poisonQueueName=TEST.POISON

# バックアウト回数
nablarch.backoutLimit=3

# 読取タイムアウト設定[ミリ秒]
nablarch.readTimeout=300000

# 送信電文の有効期限[ミリ秒]
nablarch.timeToLive=60000
